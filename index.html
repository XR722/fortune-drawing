<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>福气抽签 · 今日运势</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --bg-deep: #120c08;
  --bg-surface: #1e1610;
  --bg-elevated: #2a1f16;
  --gold: #d4a843;
  --gold-light: #e8c96a;
  --gold-dim: #8b6914;
  --vermillion: #c43a2b;
  --vermillion-deep: #8b1a1a;
  --cream: #f5efe4;
  --cream-dim: #b8a898;
  --ink: #3d2c1c;
  --font-display: 'Noto Serif SC', 'SimSun', 'STSong', serif;
  --font-body: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 16px; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg-deep);
  color: var(--cream);
  font-family: var(--font-body);
  min-height: 100dvh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ---- Texture overlay ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(196,58,43,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(212,168,67,0.05) 0%, transparent 50%);
  opacity: 1;
}

/* ---- Ambient particles ---- */
.ambient-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0;
}
.particle.gold { background: var(--gold); box-shadow: 0 0 6px var(--gold-light); }
.particle.red { background: var(--vermillion); box-shadow: 0 0 4px var(--vermillion); }
.particle.cream { background: var(--cream); }

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ---- Main container ---- */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 24px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ---- Screen management ---- */
.screen { display: none; width: 100%; flex: 1; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ==================== HOME SCREEN ==================== */
#home-screen { justify-content: center; padding-top: 8vh; padding-bottom: 8vh; }

.home-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 48px;
}

.home-seal {
  width: 88px;
  height: 88px;
  border: 2.5px solid var(--vermillion);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: sealPulse 4s ease-in-out infinite;
}

@keyframes sealPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(196,58,43,0.4); }
  50% { box-shadow: 0 0 0 16px rgba(196,58,43,0); }
}

.home-seal-inner {
  width: 68px;
  height: 68px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.home-seal-char {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}

.home-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 2.8rem);
  font-weight: 700;
  color: var(--cream);
  letter-spacing: 0.08em;
  text-align: center;
}

.home-subtitle {
  font-family: var(--font-display);
  font-size: 0.95rem;
  color: var(--cream-dim);
  letter-spacing: 0.12em;
  text-align: center;
}

.home-divider {
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 8px 0;
}

.home-desc {
  font-size: 0.9rem;
  color: var(--cream-dim);
  text-align: center;
  max-width: 280px;
  margin-top: 4px;
  letter-spacing: 0.04em;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 48px;
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--bg-deep);
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.3s var(--ease-out-expo), box-shadow 0.3s var(--ease-out-expo);
  box-shadow: 0 4px 24px rgba(212,168,67,0.25);
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.btn-primary:active {
  transform: scale(0.96);
  box-shadow: 0 2px 12px rgba(212,168,67,0.15);
}

.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.btn-primary:hover::after { transform: translateX(100%); }

.home-today {
  margin-top: 32px;
  font-size: 0.8rem;
  color: var(--cream-dim);
  letter-spacing: 0.06em;
  opacity: 0.6;
}

/* ==================== QUIZ SCREEN ==================== */
#quiz-screen { padding-top: 6vh; }

.quiz-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.quiz-counter {
  font-family: var(--font-display);
  font-size: 1.2rem;
  color: var(--cream-dim);
  letter-spacing: 0.06em;
}

.quiz-counter span {
  color: var(--gold);
  font-weight: 700;
  font-size: 1.6rem;
}

.quiz-back {
  background: none;
  border: none;
  color: var(--cream-dim);
  font-family: var(--font-body);
  font-size: 0.9rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  padding: 4px;
  transition: color 0.2s;
}

.quiz-back:hover { color: var(--cream); }

.quiz-progress {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 1px;
  margin-bottom: 40px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--vermillion), var(--gold));
  border-radius: 1px;
  transition: width 0.5s var(--ease-out-expo);
}

.quiz-question-wrap {
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.quiz-question-label {
  font-family: var(--font-display);
  font-size: 0.8rem;
  color: var(--gold-dim);
  letter-spacing: 0.12em;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.quiz-question {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 3.5vw, 1.5rem);
  font-weight: 600;
  color: var(--cream);
  text-align: center;
  line-height: 1.5;
  margin-bottom: 40px;
  letter-spacing: 0.03em;
}

.quiz-options {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.quiz-option {
  width: 100%;
  padding: 16px 20px;
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--cream);
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.03em;
  transition: all 0.3s var(--ease-out-expo);
  position: relative;
  overflow: hidden;
}

.quiz-option::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--gold);
  border-radius: 0 2px 2px 0;
  transform: scaleY(0);
  transition: transform 0.3s var(--ease-out-expo);
}

.quiz-option:hover {
  background: var(--bg-elevated);
  border-color: rgba(212,168,67,0.2);
}

.quiz-option:active { transform: scale(0.98); }

.quiz-option.selected {
  background: var(--bg-elevated);
  border-color: var(--gold);
}
.quiz-option.selected::before { transform: scaleY(1); }

.quiz-option-text {
  position: relative;
  z-index: 1;
}

/* ---- Question transition animations ---- */
.quiz-content-exit {
  animation: quizSlideOut 0.35s var(--ease-out-expo) forwards;
}
.quiz-content-enter {
  animation: quizSlideIn 0.4s 0.05s var(--ease-out-expo) forwards;
}

@keyframes quizSlideOut {
  0% { opacity: 1; transform: translateY(0); filter: blur(0); }
  100% { opacity: 0; transform: translateY(-24px); filter: blur(4px); }
}
@keyframes quizSlideIn {
  0% { opacity: 0; transform: translateY(28px); filter: blur(4px); }
  100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}

/* ---- Calculating overlay ---- */
.calculating-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--bg-deep);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s var(--ease-out-expo);
  overflow: hidden;
}
.calculating-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.calc-ring {
  width: 140px;
  height: 140px;
  position: relative;
  margin-bottom: 40px;
}

.calc-ring-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--gold);
  animation: calcRingSpin 1.2s linear infinite;
}
.calc-ring-outer::before,
.calc-ring-outer::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 2px solid transparent;
}
.calc-ring-outer::before {
  inset: 8px;
  border-right-color: var(--vermillion);
  animation: calcRingSpin 1.8s linear infinite reverse;
}
.calc-ring-outer::after {
  inset: 16px;
  border-bottom-color: var(--gold-dim);
  animation: calcRingSpin 2.4s linear infinite;
}

@keyframes calcRingSpin {
  to { transform: rotate(360deg); }
}

.calc-seal {
  position: absolute;
  inset: 24px;
  border-radius: 50%;
  border: 1.5px solid rgba(212,168,67,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: calcSealPulse 1.5s ease-in-out infinite;
}
@keyframes calcSealPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.3); transform: scale(1); }
  50% { box-shadow: 0 0 0 20px rgba(212,168,67,0); transform: scale(1.04); }
}

.calc-seal-char {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  animation: calcCharGlow 1.5s ease-in-out infinite;
}
@keyframes calcCharGlow {
  0%, 100% { text-shadow: 0 0 8px rgba(212,168,67,0.3); }
  50% { text-shadow: 0 0 24px rgba(212,168,67,0.7); }
}

.calc-text {
  font-family: var(--font-display);
  font-size: 1.05rem;
  color: var(--cream-dim);
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 2px;
}

.calc-dot {
  display: inline-block;
  width: 4px;
  opacity: 0;
  animation: calcDotBlink 1.2s ease-in-out infinite;
}
.calc-dot:nth-child(1) { animation-delay: 0s; }
.calc-dot:nth-child(2) { animation-delay: 0.3s; }
.calc-dot:nth-child(3) { animation-delay: 0.6s; }

@keyframes calcDotBlink {
  0%, 100% { opacity: 0; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-2px); }
}

.calc-spark {
  position: absolute;
  width: 3px;
  height: 3px;
  background: var(--gold-light);
  border-radius: 50%;
  animation: calcSpark 2s ease-in-out infinite;
  opacity: 0;
}
@keyframes calcSpark {
  0%, 100% { opacity: 0; transform: scale(0) rotate(0deg) translateX(60px); }
  50% { opacity: 1; transform: scale(1) rotate(180deg) translateX(70px); }
}

@media (prefers-reduced-motion: reduce) {
  .quiz-content-exit { animation: none; opacity: 0; }
  .quiz-content-enter { animation: none; opacity: 1; transform: none; filter: none; }
  .calc-ring-outer,
  .calc-ring-outer::before,
  .calc-ring-outer::after { animation: none; }
  .calc-seal { animation: none; }
  .calc-seal-char { animation: none; }
  .calc-dot { animation: none; opacity: 1; }
  .calc-spark { animation: none; opacity: 0; }
}

/* ==================== FORTUNE SCREEN ==================== */
#fortune-screen { justify-content: center; padding-top: 6vh; padding-bottom: 6vh; }

.fortune-card {
  width: 100%;
  background: linear-gradient(170deg, #1e1610 0%, #1a120a 100%);
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 16px;
  padding: 40px 28px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.fortune-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--vermillion), var(--gold), var(--vermillion));
  border-radius: 16px 16px 0 0;
}

.fortune-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--vermillion), var(--gold), var(--vermillion));
}

.fortune-badge {
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.fortune-level {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 8vw, 4rem);
  font-weight: 900;
  margin-bottom: 4px;
  line-height: 1;
}

.fortune-level.daji { background: linear-gradient(180deg, #ff6b5e 0%, #e8c96a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.fortune-level.zhongji { background: linear-gradient(180deg, #e8c96a 0%, #d4a843 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.fortune-level.xiaoji { background: linear-gradient(180deg, #d4a843 0%, #c9a86c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.fortune-level.ji { background: linear-gradient(180deg, #b8a898 0%, #9b8a7a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.fortune-level.moji { background: linear-gradient(180deg, #9b8a7a 0%, #7a6a5a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.fortune-poem {
  font-family: var(--font-display);
  font-size: 0.95rem;
  color: var(--cream-dim);
  text-align: center;
  line-height: 1.8;
  margin: 16px 0 24px;
  letter-spacing: 0.04em;
}

.fortune-detail {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}

.fortune-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.fortune-row-label {
  font-size: 0.85rem;
  color: var(--cream-dim);
  letter-spacing: 0.04em;
}

.fortune-row-value {
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--cream);
  letter-spacing: 0.04em;
}

.fortune-advice {
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--gold);
  text-align: center;
  line-height: 1.7;
  letter-spacing: 0.04em;
  padding: 16px;
  background: rgba(212,168,67,0.06);
  border-radius: 8px;
  width: 100%;
  margin-bottom: 28px;
}

.fortune-date {
  font-size: 0.75rem;
  color: var(--cream-dim);
  letter-spacing: 0.06em;
  opacity: 0.6;
}

.fortune-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  margin-top: 24px;
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 32px;
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--cream);
  background: transparent;
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s var(--ease-out-expo);
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:active { background: rgba(212,168,67,0.1); border-color: var(--gold); }

.btn-save {
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  border: none;
  color: var(--bg-deep);
}

.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-elevated);
  color: var(--cream);
  padding: 12px 28px;
  border-radius: 50px;
  font-family: var(--font-display);
  font-size: 0.9rem;
  letter-spacing: 0.04em;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  border: 1px solid rgba(212,168,67,0.2);
  transition: all 0.4s var(--ease-out-expo);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---- save overlay ---- */
.save-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.save-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.save-overlay-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--cream);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.save-tip {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--cream-dim);
  font-size: 0.8rem;
  letter-spacing: 0.04em;
}

/* ---- responsive ---- */
@media (max-width: 380px) {
  .app { padding: 0 16px; }
  .fortune-card { padding: 32px 20px 28px; }
  .quiz-question { font-size: 1.1rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="ambient-container" id="particles"></div>

<div class="app">
  <!-- ====== HOME ====== -->
  <div class="screen active" id="home-screen">
    <div class="home-brand">
      <div class="home-seal">
        <div class="home-seal-inner">
          <span class="home-seal-char">福</span>
        </div>
      </div>
      <h1 class="home-title">福气抽签</h1>
      <div class="home-divider"></div>
      <p class="home-subtitle">今日运势 · 福签指引</p>
      <p class="home-desc">诚心答五问，福签示天机。每日一测，窥见今日吉凶。</p>
    </div>
    <button class="btn-primary" id="btn-start" onclick="startQuiz()">
      <span>开始抽签</span>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="home-today" id="home-date"></div>
  </div>

  <!-- ====== QUIZ ====== -->
  <div class="screen" id="quiz-screen">
    <div class="quiz-header">
      <span class="quiz-counter">第 <span id="q-current">1</span> / 5 题</span>
      <button class="quiz-back" onclick="goHome()">返回</button>
    </div>
    <div class="quiz-progress"><div class="quiz-progress-fill" id="q-progress" style="width:0%"></div></div>
    <div class="quiz-question-wrap" id="quiz-content"></div>
  </div>

  <!-- ====== FORTUNE ====== -->
  <div class="screen" id="fortune-screen">
    <div class="fortune-card" id="fortune-card">

// ==================== HELPERS ====================

function seedRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) {
    h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  }
  return function() {
    h = (h * 1103515245 + 12345) & 0x7fffffff;
    return h / 0x7fffffff;
  };
}

function shuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodaySeed() {
  return getTodayStr();
}

function pickTodayQuestions() {
  // Each person gets different random questions on the same day
  const byCategory = {};
  questionBank.forEach(q => {
    if (!byCategory[q.category]) byCategory[q.category] = [];
    byCategory[q.category].push(q);
  });
  const categories = Object.keys(byCategory);
  // Shuffle categories
  for (let i = categories.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [categories[i], categories[j]] = [categories[j], categories[i]];
  }
  const picked = [];
  // Pick one from each category first
  for (const cat of categories) {
    if (picked.length >= 5) break;
    const pool = byCategory[cat];
    picked.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  // If still need more, pick randomly from remaining
  while (picked.length < 5) {
    const remaining = questionBank.filter(q => !picked.find(p => p.id === q.id));
    if (remaining.length === 0) break;
    picked.push(remaining[Math.floor(Math.random() * remaining.length)]);
  }
  // Final shuffle
  for (let i = picked.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picked[i], picked[j]] = [picked[j], picked[i]];
  }
  return picked.slice(0, 5);
}

// Particle system
function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['gold', 'red', 'cream'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = `particle ${colors[Math.floor(Math.random() * colors.length)]}`;
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = 6 + Math.random() * 12 + 's';
    p.style.animationDelay = Math.random() * 8 + 's';
    container.appendChild(p);
  }
}

// Screen switching
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id + '-screen').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ==================== QUIZ LOGIC ====================

function goHome() {
  showScreen('home');
}

function startQuiz() {
  currentQuestions = pickTodayQuestions();
  currentIndex = 0;
  answers = [];
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  if (currentIndex >= currentQuestions.length) {
    showCalculating();
    return;
  }
  const q = currentQuestions[currentIndex];
  document.getElementById('q-current').textContent = currentIndex + 1;
  document.getElementById('q-progress').style.width = (currentIndex / 5 * 100) + '%';

  const content = document.getElementById('quiz-content');
  // Remove transition classes, set initial state for enter animation
  content.classList.remove('quiz-content-exit', 'quiz-content-enter');

  content.innerHTML = `
    <div class="quiz-question-label">${q.category}</div>
    <div class="quiz-question">${q.text}</div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `
        <button class="quiz-option" onclick="selectAnswer(${i}, this)" data-index="${i}">
          <span class="quiz-option-text">${opt.text}</span>
        </button>
      `).join('')}
    </div>
  `;

  // Force reflow then trigger enter animation
  void content.offsetWidth;
  content.classList.add('quiz-content-enter');
}

function selectAnswer(idx, el) {
  if (el.classList.contains('selected')) return;

  el.parentElement.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');

  const q = currentQuestions[currentIndex];
  answers.push({ questionId: q.id, scores: q.options[idx].scores });

  // Trigger exit animation on question content
  const content = document.getElementById('quiz-content');
  content.classList.remove('quiz-content-enter');
  content.classList.add('quiz-content-exit');

  // After exit animation completes, advance
  const exitDuration = 350;
  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= currentQuestions.length) {
      document.getElementById('q-progress').style.width = '100%';
      renderQuestion(); // will call showCalculating()
    } else {
      document.getElementById('q-progress').style.width = (currentIndex / 5 * 100) + '%';
      renderQuestion();
    }
  }, exitDuration);
}

// ==================== CALCULATING OVERLAY ====================

function showCalculating() {
  // Switch to fortune screen immediately so quiz content is gone
  showScreen('fortune');
  // Hide fortune card until overlay finishes
  const card = document.getElementById('fortune-card');
  card.style.opacity = '0';
  card.style.transform = 'scale(0.92) translateY(20px)';

  const overlay = document.getElementById('calculating-overlay');
  overlay.classList.add('active');

  // Dynamic spark particles
  const ring = document.getElementById('calc-ring');
  ring.querySelectorAll('.calc-spark').forEach(s => s.remove());
  for (let i = 0; i < 8; i++) {
    const spark = document.createElement('div');

    spark.style.animationDelay = (i * 0.25) + 's';
    spark.style.top = '50%';
    spark.style.left = '50%';
    ring.appendChild(spark);
  }

  // Determine fortune — do calculation now, reveal after delay

  // After ~3 seconds, reveal fortune
  setTimeout(() => {
    overlay.classList.remove('active');
    setTimeout(() => {
      card.style.transition = 'opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo)';
      card.style.opacity = '1';
      card.style.transform = 'scale(1) translateY(0)';
    }, 200);
  }, 3000);
}

// ==================== FORTUNE LOGIC ====================

function computeFortune() {
  const totals = { love: 0, career: 0, wealth: 0, health: 0, luck: 0 };
  answers.forEach(a => {
    for (const [k, v] of Object.entries(a.scores)) {
      totals[k] += v;
    }
  });

  const totalScore = Object.values(totals).reduce((a, b) => a + b, 0);
  const maxPossible = 5 * 5 * 5;
  const ratio = totalScore / maxPossible;

  let levelKey;
  if (ratio >= 0.8) levelKey = 'daji';
  else if (ratio >= 0.6) levelKey = 'zhongji';
  else if (ratio >= 0.45) levelKey = 'xiaoji';
  else if (ratio >= 0.3) levelKey = 'ji';
  else levelKey = 'moji';

  const fortune = fortuneData[levelKey];
  const poemIdx = Math.floor(Math.random() * fortune.poems.length);
  const adviceIdx = Math.floor(Math.random() * fortune.advice.length);
  const poem = fortune.poems[poemIdx];
  const advice = fortune.advice[adviceIdx];

  document.getElementById('f-level').textContent = fortune.name;
  document.getElementById('f-level').className = 'fortune-level ' + fortune.cssClass;
  document.getElementById('f-poem').innerHTML = poem.replace(/\n/g, '<br>');
  document.getElementById('f-advice').textContent = advice;

  const dtl = fortune.details;
  document.getElementById('f-detail').innerHTML = `
    <div class="fortune-row"><span class="fortune-row-label">缘分</span><span class="fortune-row-value">${dtl.love}</span></div>
    <div class="fortune-row"><span class="fortune-row-label">事业</span><span class="fortune-row-value">${dtl.career}</span></div>
    <div class="fortune-row"><span class="fortune-row-label">财运</span><span class="fortune-row-value">${dtl.wealth}</span></div>
    <div class="fortune-row"><span class="fortune-row-label">健康</span><span class="fortune-row-value">${dtl.health}</span></div>
    <div class="fortune-row"><span class="fortune-row-label">运势</span><span class="fortune-row-value">${dtl.luck}</span></div>
  `;

  const today = new Date();
  document.getElementById('f-date').textContent =
    `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 · 福气抽签`;
}

// ==================== SAVE & SHARE ====================

// Resolve fortune-level gradient to solid color for html2canvas
const FORTUNE_LEVEL_COLORS = {
  daji: '#e8c96a',
  zhongji: '#d4a843',
  xiaoji: '#d4a843',
  ji: '#b8a898',
  moji: '#9b8a7a',
};

async function saveFortune() {
  try {
    showToast('正在生成福签图片...');

    // Create a clean render for screenshot
    const container = document.getElementById('save-image-container');
    const fortuneCard = document.getElementById('fortune-card');

    container.innerHTML = fortuneCard.outerHTML;
    const clone = container.querySelector('.fortune-card');
    clone.style.transform = 'none';
    clone.style.opacity = '1';

    // Apply inline styles so html2canvas renders colors correctly
    // (CSS variables & gradient text don't work in html2canvas)
    const badge = clone.querySelector('.fortune-badge');
    if (badge) badge.style.color = '#d4a843';

    const level = clone.querySelector('.fortune-level');
    if (level) {
      for (const [cls, solidColor] of Object.entries(FORTUNE_LEVEL_COLORS)) {
        if (level.classList.contains(cls)) {
          level.style.color = solidColor;
          level.style.background = 'none';
          level.style.webkitBackgroundClip = 'unset';
          level.style.webkitTextFillColor = solidColor;
          break;
        }
      }
    }

    const poem = clone.querySelector('.fortune-poem');
    if (poem) poem.style.color = '#b8a898';

    clone.querySelectorAll('.fortune-row-value').forEach(el => {
      el.style.color = '#f5efe4';
    });

    const advice = clone.querySelector('.fortune-advice');
    if (advice) advice.style.color = '#d4a843';

    const date = clone.querySelector('.fortune-date');
    if (date) { date.style.color = '#b8a898'; date.style.opacity = '0.6'; }

    // Wait for fonts
    await new Promise(r => setTimeout(r, 200));

    const canvas = await html2canvas(clone, {
      backgroundColor: '#1e1610',
      scale: 2,
      useCORS: true,
      logging: false,
    });

    // Convert canvas to <img> so mobile can long-press to save/share
    const img = new Image();
    img.src = canvas.toDataURL('image/png');
    img.style.maxWidth = '100%';
    img.style.borderRadius = '16px';
    img.style.display = 'block';

    container.innerHTML = '';
    container.appendChild(img);

    document.getElementById('save-overlay').classList.add('show');
    showToast('长按图片即可保存分享');
  } catch (e) {
    console.error(e);
    showToast('生成失败，请重试');
  }
}

function closeSaveOverlay() {
  document.getElementById('save-overlay').classList.remove('show');
}
